<!DOCTYPE html>
<html lang="ckb">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پرسیاری ئیسلامی</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0e1f29 0%, #2a4a3f 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            direction: rtl;
        }

        .header {
            background: linear-gradient(135deg, #0b2b23 0%, #1a3f35 100%);
            color: white;
            padding: 10px 10px;
            text-align: center;
            border-bottom: 4px solid #ffffff;
        }

        .header h1 {
            font-size: 2.2rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
            margin-bottom: 15px;
        }

        .language-switcher {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .lang-btn {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 2px solid white;
            border-radius: 50px;
            padding: 8px 20px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .lang-btn:hover {
            background: white;
            color: #0b2b23;
            transform: translateY(-2px);
        }

        .lang-btn.active {
            background: #d4a373;
            border-color: #d4a373;
            color: white;
        }

        .stats-container {
            display: flex;
            justify-content: space-around;
            background: #f0f4f3;
            padding: 20px;
            border-bottom: 1px solid #ccc;
            flex-wrap: wrap;
            gap: 10px;
        }

        .stat-box {
            text-align: center;
            background: white;
            padding: 10px 25px;
            border-radius: 50px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .stat-box span {
            font-size: 1.8rem;
            font-weight: bold;
            color: #0b2b23;
            display: block;
        }

        .stat-box label {
            color: #ffffff;
            font-size: 1rem;
        }

        .quiz-area {
            padding: 30px;
            background: #f9fbfa;
        }

        .progress-bar {
            width: 100%;
            height: 10px;
            background: #e0e0e0;
            border-radius: 10px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ffffff, #ffffff);
            width: 0%;
            transition: width 0.5s ease;
        }

        .question-counter {
            text-align: center;
            margin-bottom: 20px;
            font-size: 2.8rem;
            color: #0b2b23;
            font-weight: 600;
        }

        .question-box {
            background: white;
            border-radius: 20px;
            padding: 5px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
        }

        .question-text {
            font-size: 1.6rem;
            color: #0b2b23;
            margin-bottom: 30px;
            line-height: 1.5;
            font-weight: 500;
            border-right: 5px solid #e6e6e6;
            padding-right: 100px;
        }

        .options-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 30px;
        }

        .option {
            background: #f5f7f7;
            border: 2px solid #e0e0e0;
            border-radius: 50px;
            padding: 10px 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1.6rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .option:hover:not(.disabled-option) {
            background: #e8f0ed;
            border-color: #112434;
            transform: translateY(-2px);
            box-shadow: 0 5px 10px rgba(0, 0, 0, 0.1);
        }

        .option.selected {
            background: #0b2b23;
            color: white;
            border-color: #d4a373;
        }

        .option.correct {
            background: #28a745;
            color: white;
            border-color: #1e7e34;
        }

        .option.wrong {
            background: #dc3545;
            color: white;
            border-color: #bd2130;
        }

        .option.disabled-option {
            pointer-events: none;
            opacity: 0.7;
        }

        .option-prefix {
            width: 30px;
            height: 30px;
            background: rgba(0, 0, 0, 0.1);
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .selected .option-prefix {
            background: rgb(255, 255, 255);
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
        }

        .nav-btn {
            padding: 15px 30px;
            border: none;
            border-radius: 15px;
            font-size: 1.1rem;
            font-weight: 1000;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .prev-btn {
            background: #931a1a;
            color: rgb(255, 255, 255);
            font-size: 30px;
            font-family: Georgia, 'Times New Roman', Times, serif;
        }

        .next-btn {
            background: #0b1b25;
            color: white;
            font-size: 30px;
            font-family: Georgia, 'Times New Roman', Times, serif;
        }

        .reset-btn {
            background: #dc3545;
            color: white;
            width: 100%;
            margin-top: 20px;
            justify-content: center;
        }

        .restart-btn {
            background: #d4a373;
            color: white;
        }

        .restart-btn:hover {
            background: #b5835a;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .nav-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .review-section {
            background: #f0f4f3;
            border-radius: 15px;
            padding: 20px;
            margin-top: 30px;
        }

        .review-title {
            text-align: center;
            color: #0b2b23;
            font-size: 1.3rem;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .review-grid {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 5px;
            margin-bottom: 20px;
        }

        .review-item {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .review-item:hover {
            border-color: #d4a373;
            transform: scale(1.05);
        }

        .review-item.answered {
            background: #0b2b23;
            color: white;
            border-color: #0b2c4e;
        }

        .review-item.current {
            border: 3px solid #13243c;
            transform: scale(1.05);
        }

        .review-item.correct-answer {
            background: #28a745;
            color: white;
        }

        .review-item.wrong-answer {
            background: #dc3545;
            color: white;
        }

        .review-stats {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid #ccc;
            flex-wrap: wrap;
            gap: 15px;
        }

        .review-stat {
            text-align: center;
        }

        .review-stat span {
            font-size: 1.5rem;
            font-weight: bold;
            color: #0b2b23;
            display: block;
        }

        .footer {
            text-align: center;
            padding: 20px;
            background: #0b2b23;
            color: white;
            font-size: 0.9rem;
        }

        .result-screen {
            text-align: center;
            padding: 40px;
            background: white;
            border-radius: 20px;
            margin: 20px;
        }

        .result-screen h2 {
            color: #0b2b23;
            font-size: 2rem;
            margin-bottom: 20px;
        }

        .result-score {
            font-size: 4rem;
            color: #ffffff;
            font-weight: bold;
            margin: 20px 0;
        }

        .result-message {
            font-size: 1.3rem;
            color: #333;
            margin-bottom: 30px;
        }

        .warning-message {
            background: #fff3cd;
            color: #ffffff;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 15px;
            text-align: center;
            font-weight: bold;
        }

        @media (max-width: 768px) {
            .options-container {
                grid-template-columns: 1fr;
            }
            
            .header h1 {
                font-size: 1.6rem;
            }
            
            .question-text {
                font-size: 1.2rem;
            }
            
            .nav-buttons {
                flex-wrap: wrap;
                gap: 10px;
            }
            
            .nav-btn {
                padding: 12px 20px;
                font-size: 1rem;
            }

            .review-grid {
                grid-template-columns: repeat(5, 1fr);
            }
        }
    </style>
</head>
<body>

            renderQuestion();
        }

        function calculateStats() {
            const answered = userAnswers.filter(a => a !== null).length;
            const remaining = questions.length - answered;

            answeredSpan.textContent = answered;
            remainingSpan.textContent = remaining;
            scoreSpan.textContent = score;
        }

        function handleAnswerSelection(optionIndex) {
            if (questionLocked[currentQuestionIndex] || userAnswers[currentQuestionIndex] !== null) {
                return;
            }

            const isCorrect = (optionIndex === questions[currentQuestionIndex].correct);
            
            userAnswers[currentQuestionIndex] = optionIndex;
            
            if (!isCorrect) {
                questionLocked[currentQuestionIndex] = true;
            } else {
                score++;
            }

            renderQuestion();
            calculateStats();
        }

        function renderReviewSection() {
            const answered = userAnswers.filter(a => a !== null).length;
            const correct = score;
            const wrong = answered - correct;

            let reviewGrid = '';
            for (let i = 0; i < questions.length; i++) {
                let reviewClass = 'review-item';
                if (userAnswers[i] !== null) {
                    reviewClass += ' answered';
                    if (userAnswers[i] === questions[i].correct) {
                        reviewClass += ' correct-answer';
                    } else {
                        reviewClass += ' wrong-answer';
                    }
                }
                if (i === currentQuestionIndex) {
                    reviewClass += ' current';
                }
                
                reviewGrid += `<div class="${reviewClass}" onclick="goToQuestion(${i})">${i + 1}</div>`;
            }

            return `
                <div class="review-section">
                    <div class="review-title">${translations[currentLanguage].reviewTitle}</div>
                    <div class="review-grid">
                        ${reviewGrid}
                    </div>
                    <div class="review-stats">
                        <div class="review-stat">
                            <span style="color: #28a745;">${correct}</span>
                            <label>${translations[currentLanguage].correct}</label>
                        </div>
                        <div class="review-stat">
                            <span style="color: #dc3545;">${wrong}</span>
                            <label>${translations[currentLanguage].wrong}</label>
                        </div>
                        <div class="review-stat">
                            <span>${answered}</span>
                            <label>${translations[currentLanguage].answered}</label>
                        </div>
                        <div class="review-stat">
                            <span>${questions.length - answered}</span>
                            <label>${translations[currentLanguage].remaining}</label>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderQuestion() {
            const q = questions[currentQuestionIndex];
            const selectedAnswer = userAnswers[currentQuestionIndex];
            const isLocked = questionLocked[currentQuestionIndex];
            const isAnswered = selectedAnswer !== null;

            const prefixes = ["أ", "ب", "ج", "د"];

            let optionsHtml = '';
            q.options[currentLanguage].forEach((opt, idx) => {
                let optionClass = 'option';
                
                if (isLocked || isAnswered) {
                    optionClass += ' disabled-option';
                    
                    if (idx === q.correct) {
                        optionClass += ' correct';
                    } else if (idx === selectedAnswer && selectedAnswer !== q.correct) {
                        optionClass += ' wrong';
                    }
                } else if (idx === selectedAnswer) {
                    optionClass += ' selected';
                }

                optionsHtml += `
                    <div class="${optionClass}" data-option-index="${idx}">
                        <span class="option-prefix">${prefixes[idx]}</span>
                        ${opt}
                    </div>
                `;
            });

            const progressPercent = ((currentQuestionIndex + 1) / questions.length) * 100;

            let warningMessage = '';
            if (isLocked && selectedAnswer !== null && selectedAnswer !== q.correct) {
                warningMessage = `
                    <div class="warning-message">
                        ${translations[currentLanguage].warning}
                        ${translations[currentLanguage].correctAnswer}: ${q.options[currentLanguage][q.correct]}
                    </div>
                `;
            }

            const reviewSection = renderReviewSection();

            quizArea.innerHTML = `
                <div class="progress-bar">
                    <div class="progress-fill" style="width: ${progressPercent}%"></div>
                </div>
                <div class="question-counter">
                    ${currentQuestionIndex + 1} / ${questions.length}
                </div>
                ${warningMessage}
                <div class="question-box">
                    <div class="question-text">
                        ${q.question[currentLanguage]}
                    </div>
                    <div class="options-container" id="options-container">
                        ${optionsHtml}
                    </div>
                </div>
                <div class="nav-buttons">
                    <button class="nav-btn prev-btn" ${currentQuestionIndex === 0 ? 'disabled' : ''} onclick="changeQuestion(-1)">
                        ${translations[currentLanguage].prevBtn}
                    </button>
                    <button class="nav-btn next-btn" ${currentQuestionIndex === questions.length - 1 ? 'disabled' : ''} onclick="changeQuestion(1)">
                        ${translations[currentLanguage].nextBtn}
                    </button>
                </div>
                ${reviewSection}
                ${currentQuestionIndex === questions.length - 1 ? `
                    <button class="nav-btn reset-btn" onclick="showFinalResult()">
                        ${translations[currentLanguage].resetBtn}
                    </button>
                ` : ''}
            `;

            if (!isLocked && !isAnswered) {
                document.querySelectorAll('.option').forEach(opt => {
                    opt.addEventListener('click', function() {
                        const optionIndex = parseInt(this.dataset.optionIndex);
                        handleAnswerSelection(optionIndex);
                    });
                });
            }
        }

        window.changeQuestion = function(direction) {
            const newIndex = currentQuestionIndex + direction;
            if (newIndex >= 0 && newIndex < questions.length) {
                currentQuestionIndex = newIndex;
                renderQuestion();
            }
        };

        window.goToQuestion = function(index) {
            currentQuestionIndex = index;
            renderQuestion();
        };

        window.showFinalResult = function() {
            const totalAnswered = userAnswers.filter(a => a !== null).length;
            const percentage = totalAnswered > 0 ? Math.round((score / totalAnswered) * 100) : 0;
            
            let message = '';
            if (score >= 85) message = translations[currentLanguage].excellent;
            else if (score >= 65) message = translations[currentLanguage].good;
            else if (score >= 45) message = translations[currentLanguage].average;
            else message = translations[currentLanguage].needStudy;

            quizArea.innerHTML = `
                <div class="result-screen">
                    <h2>${translations[currentLanguage].resultTitle}</h2>
                    <div class="result-score">${score} ${translations[currentLanguage].points}</div>
                    <div style="font-size: 1.5rem; margin: 10px 0; color: #0b2b23;">
                        ${translations[currentLanguage].from} ${totalAnswered} ${translations[currentLanguage].answeredQs}
                    </div>
                    <div class="result-message">${message}</div>
                    <div style="font-size: 1.2rem; margin: 20px 0; color: #555;">
                        ${translations[currentLanguage].successRate}: ${percentage}%
                    </div>
                    <button class="nav-btn restart-btn" onclick="resetQuiz()" style="width: auto; margin: 0 auto;">
                        ${translations[currentLanguage].restartBtn}
                    </button>
                </div>
            `;
        };

        window.resetQuiz = function() {
            currentQuestionIndex = 0;
            userAnswers = new Array(questions.length).fill(null);
            questionLocked = new Array(questions.length).fill(false);
            score = 0;
            renderQuestion();
            calculateStats();
        };

        // دەستپێکردن
        renderQuestion();
        calculateStats();
    </script>
</body>
</html>
